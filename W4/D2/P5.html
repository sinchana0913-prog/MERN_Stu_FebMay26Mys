<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <form id="signupForm">
    <label>Email: <input type="text" id="signupEmail" required></label><br><br>
    <input type="text" id="contact number" pattern="^[0-9{10}$]" 
    placeholder="eg: 9876543218" >
    <label>Password: <input type="password" id="signupPassword"></label>
    <button type="submit">Submit</button>
    </form>
    <p id="message"></p>
    <script src="./P5.js"></script>
</body>
</html>
